name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mise-en-place
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Run code quality checks
        run: mise run check
  build:
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Export GitHub Actions Node.js runtime environment variables
        uses: ./.github/actions/github-runtime
      - name: Log in to GitHub Container Registry (GHCR)
        if: github.ref_type == 'tag' || github.ref_name == 'main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build container image
        env:
          BUILD_CONTEXT: ./dovi_tool
          DOCKERFILE: ./dovi_tool/Dockerfile
          PLATFORMS: linux/amd64,linux/arm64
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          OCI_DESCRIPTION: Container image that can be used to run dovi_tool
          OCI_LICENSES: CC0-1.0
          OCI_URL: https://github.com/${{ github.repository }}/pkgs/container/dovi_tool
        run: ./scripts/build.sh
